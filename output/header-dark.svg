<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#018574" stop-opacity="0"/>
      <stop offset="50%" stop-color="#018574" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#018574" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090a"/>
      <stop offset="100%" stop-color="#0a0c0e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="0" y1="60" x2="60" y2="60" stroke="#018574" stroke-opacity="0.04"/>
      <line x1="60" y1="0" x2="60" y2="60" stroke="#018574" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg-grad)"/>
  <rect width="900" height="200" fill="url(#grid)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="900" height="1" fill="url(#line-grad)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="100" x2="180" y2="100" stroke="#018574" stroke-opacity="0.06"/>
  <line x1="720" y1="100" x2="900" y2="100" stroke="#018574" stroke-opacity="0.06"/>

  <!-- Corner marks -->
  <g stroke="#018574" stroke-opacity="0.15" stroke-width="1">
    <line x1="20" y1="12" x2="36" y2="12"/>
    <line x1="20" y1="12" x2="20" y2="28"/>
    <line x1="880" y1="12" x2="864" y2="12"/>
    <line x1="880" y1="12" x2="880" y2="28"/>
    <line x1="20" y1="188" x2="36" y2="188"/>
    <line x1="20" y1="188" x2="20" y2="172"/>
    <line x1="880" y1="188" x2="864" y2="188"/>
    <line x1="880" y1="188" x2="880" y2="172"/>
  </g>

  <!-- Vertical marker -->
  <text x="28" y="120" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#018574" opacity="0.25" letter-spacing="2" writing-mode="tb" transform="rotate(180 28 120)">YUER6327</text>

  <!-- Main name -->
  <text x="450" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="#e8eaec" text-anchor="middle" letter-spacing="0.03em">Yuer6327</text>

  <!-- Glitch/ghost layer -->
  <text x="448" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="#018574" text-anchor="middle" letter-spacing="0.03em" opacity="0.08">Yuer6327</text>

  <!-- Tagline -->
  <text x="450" y="120" font-family="'Courier New', monospace" font-size="14" fill="#7a8088" text-anchor="middle" letter-spacing="0.04em">精彩的人生就是无休止地折腾</text>

  <!-- Location -->
  <circle cx="396" cy="148" r="3" fill="#018574" opacity="0.6"/>
  <text x="406" y="152" font-family="'Courier New', monospace" font-size="11" fill="#4a5058" letter-spacing="0.06em">Shanghai, CN</text>

  <!-- Bottom accent line -->
  <rect x="0" y="199" width="900" height="1" fill="url(#line-grad)"/>
</svg>
